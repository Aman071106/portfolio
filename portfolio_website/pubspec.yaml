name: portfolio_website
description: "Aman Gupta — Personal Portfolio Website"
publish_to: 'none'

version: 2.0.0+1

environment:
  sdk: ^3.7.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router:
  url_launcher:
  firebase_core:
  cloud_firestore:
  animated_text_kit: ^4.2.3
  google_fonts: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/project_images/
    - assets/achievements/
    - assets/oss/
    - assets/experience_image/
    - assets/others/
    - assets/profile.jpeg
